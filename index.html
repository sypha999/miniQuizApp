<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz App</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>

<div class="container">

  <!-- START SCREEN -->
  <div id="start-screen" class="card start-screen">
    <h1>🎯 Quiz Challenge</h1>
    <p class="subtitle">Test your knowledge with a timed quiz</p>

    <div class="form-group">
      <label>📚 Category</label>
      <select id="category"></select>
    </div>

    <div class="form-group">
      <label>⚡ Difficulty</label>
      <div class="difficulty-options">
        <button type="button" data-value="">Any</button>
        <button type="button" data-value="easy">Easy</button>
        <button type="button" data-value="medium">Medium</button>
        <button type="button" data-value="hard">Hard</button>
      </div>
    </div>

    <div class="form-group">
      <label>
        ❓ Number of Questions:
        <span id="amount-value">5</span>
      </label>
      <input type="range" id="amount" min="1" max="30" value="5"/>
    </div>

    <button id="start-btn" class="start-btn">🚀 Start Quiz</button>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="quiz-screen" class="card hidden">

    <!-- TOP BAR -->
    <div class="top-bar">
      <span id="progress"></span>
      <span id="timer"></span>
    </div>

    <!-- QUESTION -->
    <h2 id="question" class="question"></h2>

    <!-- ANSWERS -->
    <div id="answers" class="answers"></div>

    <!-- NEXT BUTTON -->
    <button id="next-btn" disabled>Next ➡️</button>
  </div>

  <!-- RESULT SCREEN -->
  <div id="result-screen" class="card hidden">

    <h2>🎉 Quiz Completed</h2>

    <div class="result-summary">
      <p id="score" class="score"></p>
      <p id="summary"></p>
    </div>

    <!-- REVIEW (ONE QUESTION AT A TIME) -->
    <div id="review-container" class="review-container"></div>

    <!-- PAGINATION -->
    <div class="pagination">
      <button id="prev-btn" disabled>⬅ Prev</button>
      <span id="page-info">Question 1</span>
      <button id="next-page-btn">Next ➡</button>
    </div>

    <!-- RESTART -->
    <button onclick="location.reload()" class="restart-btn">
      🔁 Take Another Quiz
    </button>

  </div>

</div>

<script type="module" src="./js/app.js"></script>
</body>
</html>
